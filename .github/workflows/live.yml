name: Potong Video YouTube (Tanpa Logo - Fixed Cookies)

on:
  workflow_dispatch:
    inputs:
      link_youtube:
        description: 'Link YouTube (Video Sumber)'
        required: true
      mulai:
        description: 'Mulai (Jam:Menit:Detik)'
        default: '00:00:10'
      selesai:
        description: 'Selesai (Jam:Menit:Detik)'
        default: '00:00:40'

jobs:
  proses_editing:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      - name: 2. Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 3. Install Tools (Engine dari Relay Pro)
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg jq curl bc
          # Gunakan yt-dlp nightly agar selalu update menembus blokir YT
          sudo curl -L https://github.com/yt-dlp/yt-dlp-nightly-builds/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          yt-dlp -U

      - name: 4. Eksekusi Potong Video
        env:
          # Pastikan Anda sudah membuat Secret dengan nama YT_COOKIES
          YT_COOKIES: ${{ secrets.YT_COOKIES }}
        run: |
          # Membuat file cookies agar terbaca oleh yt-dlp
          echo "$YT_COOKIES" > cookies.txt
          
          echo "--- [Mencari Direct Link dengan Cookies] ---"
          # Menggunakan js-runtime node dan extractor-args agar tidak dianggap bot
          VIDEO_URL=$(yt-dlp --cookies cookies.txt \
                             --js-runtime node \
                             --force-ipv4 \
                             --no-playlist \
                             --extractor-args "youtube:player_client=mweb,web" \
                             -f "bestvideo[height<=720]+bestaudio/best[height<=720]" \
                             -g "${{ github.event.inputs.link_youtube }}")

          # Validasi jika link gagal didapatkan
          if [ -z "$VIDEO_URL" ]; then
            echo "ERROR: Gagal mendapatkan URL. Cek isi YT_COOKIES di Secrets GitHub Anda!"
            exit 1
          fi

          echo "--- [Memulai Pemotongan Video] ---"
          # FFmpeg memproses link video langsung dengan durasi yang ditentukan
          ffmpeg -ss ${{ github.event.inputs.mulai }} -to ${{ github.event.inputs.selesai }} -i "$VIDEO_URL" \
          -c:v libx264 -preset fast -crf 22 -c:a aac -b:a 128k \
          hasil_potongan.mp4

      - name: 5. Upload Hasil
        uses: actions/upload-artifact@v4
        with:
          name: Video_Tanpa_Logo
          path: hasil_potongan.mp4
          retention-days: 1
