name: Potong Video YouTube (1080p Ultra HD)

on:
  workflow_dispatch:
    inputs:
      link_youtube:
        description: 'Link YouTube (Video Sumber)'
        required: true
      mulai:
        description: 'Mulai (Jam:Menit:Detik)'
        default: '00:00:10'
      selesai:
        description: 'Selesai (Jam:Menit:Detik)'
        default: '00:00:40'

jobs:
  proses_editing:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      - name: 2. Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 3. Install Tools (High Efficiency)
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg jq curl bc
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: 4. Eksekusi Potong Video (1080p Best Quality)
        env:
          YT_COOKIES: ${{ secrets.YT_COOKIES }}
        run: |
          # Simpan cookies jika ada
          if [ -n "$YT_COOKIES" ]; then
            echo "$YT_COOKIES" > cookies.txt
            COOKIE_ARG="--cookies cookies.txt"
          else
            COOKIE_ARG=""
          fi
          
          echo "--- [Mencari Direct Link 1080p] ---"
          # -f "bestvideo[height<=1080][ext=mp4]+bestaudio[ext=m4a]/best[height<=1080]"
          # Memastikan kita mengambil 1080p terbaik dengan format mp4/m4a agar kompatibel
          VIDEO_URL=$(yt-dlp $COOKIE_ARG \
                             --force-ipv4 \
                             --no-playlist \
                             -f "bestvideo[height<=1080]+bestaudio/best[height<=1080]" \
                             -g "${{ github.event.inputs.link_youtube }}")

          if [ -z "$VIDEO_URL" ]; then
            echo "ERROR: Gagal mendapatkan URL 1080p. Cek ketersediaan video atau YT_COOKIES!"
            exit 1
          fi

          echo "--- [Memulai Pemotongan Video 1080p High-Bitrate] ---"
          # Parameter Pro:
          # -crf 17: Level visual hampir tidak bisa dibedakan dari sumber asli (Sangat Jernih)
          # -preset slow: FFmpeg bekerja lebih keras untuk menjaga detail tekstur
          # -b:a 320k: Kualitas audio tertinggi untuk format AAC
          
          ffmpeg -ss ${{ github.event.inputs.mulai }} -to ${{ github.event.inputs.selesai }} -i "$VIDEO_URL" \
          -c:v libx264 -preset slow -crf 17 -c:a aac -b:a 320k -movflags +faststart \
          hasil_1080p_jernih.mp4

      - name: 5. Upload Hasil HD
        uses: actions/upload-artifact@v4
        with:
          name: Video_1080p_FullHD
          path: hasil_1080p_jernih.mp4
          retention-days: 1
          
